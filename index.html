<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<title>Night Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12; --surface: #12121e; --border: #1e1e30;
    --accent: #7c6fff; --accent2: #ff6fb0; --text: #e8e8f0; --muted: #5a5a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.05em; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .tabs { display: flex; gap: 8px; }
  .tab { background: none; border: 1px solid var(--border); color: #e8e8f0; font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view { display: none; padding: 24px; }
  .view.active { display: block; }

  .log-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 70px); gap: 28px; padding: 24px; }
  .tap-btn { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #9d8fff, #5a4fff); border: none; cursor: pointer; box-shadow: 0 20px 60px rgba(124,111,255,0.3); transition: transform 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; user-select: none; }
  .tap-btn:active { transform: scale(0.93); }
  .tap-btn .icon { font-size: 2.5rem; }
  .tap-btn .btn-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.9); }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(0.92)} 100%{transform:scale(1)} }
  .pulse { animation: pulse 0.3s ease-out; }
  .last-tap { font-size: 0.7rem; color: #e8e8f0; text-align: center; min-height: 1.2em; }

  .streak-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; display: flex; width: 100%; max-width: 320px; }
  .streak-stat { flex: 1; text-align: center; padding: 0 6px; border-right: 1px solid var(--border); }
  .streak-stat:last-child { border-right: none; }
  .streak-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--accent); line-height: 1; }
  .streak-label { font-size: 0.55rem; color: #e8e8f0; margin-top: 4px; line-height: 1.4; text-transform: uppercase; }

  .undo-btn { background: none; border: 1px solid var(--border); color: #e8e8f0; font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
  .undo-btn:active { border-color: var(--accent2); color: var(--accent2); }

  .water-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 0.68rem; color: #e8e8f0; text-align: center; line-height: 1.7; width: 100%; max-width: 320px; }
  .water-badge strong { color: var(--accent2); }

  .notes-wrap { width: 100%; max-width: 320px; }
  .notes-label { font-size: 0.62rem; color: #e8e8f0; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .notes-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 10px 14px; resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5; }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: #e8e8f0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent); margin-bottom: 6px; }
  .modal-sub { font-size: 0.85rem; color: #e8e8f0; margin-bottom: 24px; line-height: 1.5; }
  .modal-q { font-size: 0.9rem; color: var(--text); margin-bottom: 10px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .choice-btn { background: var(--bg); border: 1px solid var(--border); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 10px 18px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
  .choice-btn.selected { background: var(--accent); border-color: var(--accent); }
  .modal-save { width: 100%; background: var(--accent); border: none; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; padding: 16px; border-radius: 10px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
  .modal-save.ready { opacity: 1; }

  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #e8e8f0; margin-bottom: 16px; margin-top: 28px; }
  .section-title:first-child { margin-top: 0; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 16px 12px; overflow-x: auto; }
  .chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; min-width: max-content; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 32px; }
  .bar-val { font-size: 0.6rem; color: #e8e8f0; min-height: 12px; }
  .bar { width: 22px; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; }
  .bar.zero { background: var(--border); }
  .bar-date { font-size: 0.55rem; color: #e8e8f0; text-align: center; line-height: 1.2; white-space: nowrap; }
  .bar-water { font-size: 0.55rem; color: var(--accent2); text-align: center; margin-top: 2px; }
  .chart-period-label { font-size: 0.65rem; color: var(--accent2); margin-top: 10px; }
  .legend { display: flex; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.6rem; color: #e8e8f0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .corr-strip { display: flex; flex-direction: column; gap: 6px; }
  .corr-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.65rem; }
  .corr-date { color: #e8e8f0; min-width: 60px; }
  .corr-pee { color: var(--accent); font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.85rem; min-width: 24px; }
  .corr-water { color: var(--accent2); }
  .corr-timing { color: #e8e8f0; margin-left: auto; }
  .corr-no-data { color: var(--border); font-style: italic; }

  .night-list { display: flex; flex-direction: column; gap: 8px; }
  .period-header { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); padding: 12px 0 4px; border-bottom: 1px solid var(--border); margin-top: 8px; }
  .night-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .night-row-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .night-row .date { font-size: 0.75rem; color: var(--text); }
  .night-row .times { font-size: 0.62rem; color: #e8e8f0; margin-top: 3px; line-height: 1.6; }
  .night-row .count { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent); }
  .night-row .water-info { font-size: 0.62rem; color: var(--accent2); margin-top: 6px; }
  .night-row .note-text { font-size: 0.62rem; color: #e8e8f0; margin-top: 4px; font-style: italic; }
  .empty { text-align: center; color: #e8e8f0; font-size: 0.75rem; padding: 40px 0; }

  .export-btn { background: none; border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 12px 20px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 16px; }
  .export-btn:active { background: var(--accent); color: #fff; }
  .day-btns { display: flex; gap: 10px; }
  .small-btn { background: var(--accent); border: none; color: #fff; font-family: 'DM Mono', monospace; font-size: 0.68rem; padding: 9px 18px; border-radius: 20px; cursor: pointer; }
  .small-btn:active { opacity: 0.8; }
  .reset-btn:active { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-title">Good Evening 🌙</div>
    <div class="modal-sub">Quick check-in before tonight's tracking begins.</div>
    <div class="modal-q">Glasses of water today?</div>
    <div class="btn-group" id="glasses-group">
      <button class="choice-btn" onclick="selectChoice('glasses','0-3',this)">0–3</button>
      <button class="choice-btn" onclick="selectChoice('glasses','4-6',this)">4–6</button>
      <button class="choice-btn" onclick="selectChoice('glasses','7-9',this)">7–9</button>
      <button class="choice-btn" onclick="selectChoice('glasses','10+',this)">10+</button>
    </div>
    <div class="modal-q">When did you drink most of it?</div>
    <div class="btn-group" id="timing-group">
      <button class="choice-btn" onclick="selectChoice('timing','morning',this)">Morning</button>
      <button class="choice-btn" onclick="selectChoice('timing','afternoon',this)">Afternoon</button>
      <button class="choice-btn" onclick="selectChoice('timing','evening',this)">Evening</button>
      <button class="choice-btn" onclick="selectChoice('timing','neutral',this)">Spread out</button>
    </div>
    <button class="modal-save" id="modal-save" onclick="saveIntake()">START TONIGHT</button>
  </div>
</div>

<nav>
  <div class="logo">NIGHT<span>LOG</span></div>
  <div class="tabs">
    <button class="tab active" onclick="showView('log', event)">LOG</button>
    <button class="tab" onclick="showView('history', event)">HISTORY</button>
  </div>
</nav>

<div id="view-log" class="view active log-view">

  <div class="streak-card">
    <div class="streak-stat">
      <div class="streak-num" id="avg7">—</div>
      <div class="streak-label">avg/night<br>last 7</div>
    </div>
    <div class="streak-stat">
      <div class="streak-num" id="avg30">—</div>
      <div class="streak-label">avg/night<br>last 30</div>
    </div>
    <div class="streak-stat">
      <div class="streak-num" id="tonight-num">0</div>
      <div class="streak-label">times<br>tonight</div>
    </div>
  </div>

  <button class="tap-btn" id="tap-btn" onclick="logTap()">
    <div class="icon">🌙</div>
    <div class="btn-label">TAP</div>
  </button>

  <div class="last-tap" id="last-tap">no taps yet tonight</div>
  <button class="undo-btn" id="undo-btn" onclick="undoTap()" style="display:none">↩ undo last tap</button>

  <div class="water-badge" id="water-badge" style="display:none"></div>
  <div class="day-btns" id="day-btns" style="display:none">
    <button class="small-btn" onclick="resetTonight()">↺ Reset Check-in</button>
    <button class="small-btn" onclick="startDay()">☀️ Start Day</button>
  </div>

  <div class="notes-wrap">
    <div class="notes-label">tonight's notes (optional)</div>
    <textarea class="notes-input" id="notes-input" rows="2" placeholder="e.g. had wine, took Advil PM..." oninput="saveNote()"></textarea>
  </div>

</div>

<div id="view-history" class="view">
  <div id="history-content"></div>
</div>

<script>
const TAPS_KEY   = 'nightlog_taps';
const INTAKE_KEY = 'nightlog_intake';
const NOTES_KEY  = 'nightlog_notes';
let modalChoices = { glasses: null, timing: null };

function loadTaps()        { try { return JSON.parse(localStorage.getItem(TAPS_KEY))   || []; }  catch { return []; } }
function saveTaps(t)       { localStorage.setItem(TAPS_KEY, JSON.stringify(t)); }
function loadIntake()      { try { return JSON.parse(localStorage.getItem(INTAKE_KEY)) || {}; } catch { return {}; } }
function saveIntakeData(d) { localStorage.setItem(INTAKE_KEY, JSON.stringify(d)); }
function loadNotes()       { try { return JSON.parse(localStorage.getItem(NOTES_KEY))  || {}; } catch { return {}; } }
function saveNotesData(d)  { localStorage.setItem(NOTES_KEY, JSON.stringify(d)); }

function getNightKey(ts) {
  const d = new Date(ts);
  if (d.getHours() < 20) {
    const prev = new Date(d);
    prev.setDate(prev.getDate() - 1);
    return prev.toISOString().slice(0,10);
  }
  return d.toISOString().slice(0,10);
}
function getTonightKey() { return getNightKey(Date.now()); }

function selectChoice(type, value, el) {
  const gid = type === 'glasses' ? 'glasses-group' : 'timing-group';
  document.querySelectorAll('#'+gid+' .choice-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  modalChoices[type] = value;
  if (modalChoices.glasses && modalChoices.timing) document.getElementById('modal-save').classList.add('ready');
}

function saveIntake() {
  if (!modalChoices.glasses || !modalChoices.timing) return;
  const intake = loadIntake();
  intake[getTonightKey()] = { glasses: modalChoices.glasses, timing: modalChoices.timing };
  saveIntakeData(intake);
  document.getElementById('modal').classList.add('hidden');
  updateWaterBadge();
}

function resetTonight() {
  const intake = loadIntake();
  delete intake[getTonightKey()];
  saveIntakeData(intake);
  modalChoices = { glasses: null, timing: null };
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('modal-save').classList.remove('ready');
  updateWaterBadge();
  document.getElementById('modal').classList.remove('hidden');
}

function startDay() {
  // Reset the view to zero without touching stored data
  document.getElementById('tonight-num').textContent = '0';
  document.getElementById('last-tap').textContent = 'no taps yet tonight';
  document.getElementById('undo-btn').style.display = 'none';
  document.getElementById('water-badge').style.display = 'none';
  document.getElementById('day-btns').style.display = 'none';
  document.getElementById('notes-input').value = '';
  document.getElementById('avg7').textContent = '—';
  document.getElementById('avg30').textContent = '—';
}

function checkShowModal() {
  const hour = new Date().getHours();
  if ((hour >= 20 || hour < 8) && !loadIntake()[getTonightKey()])
    document.getElementById('modal').classList.remove('hidden');
}

function updateWaterBadge() {
  const inf = loadIntake()[getTonightKey()];
  const badge = document.getElementById('water-badge');
  if (inf) {
    const tLabel = {morning:'mostly morning',afternoon:'mostly afternoon',evening:'mostly evening',neutral:'spread out'}[inf.timing];
    badge.innerHTML = `<strong>Today's water:</strong> ${inf.glasses} glasses &nbsp;·&nbsp; ${tLabel}`;
    badge.style.display = 'block';
    document.getElementById('day-btns').style.display = 'flex';
  } else {
    badge.style.display = 'none';
    document.getElementById('day-btns').style.display = 'none';
  }
}

function logTap() {
  const taps = loadTaps();
  taps.push(Date.now());
  saveTaps(taps);
  const btn = document.getElementById('tap-btn');
  btn.classList.remove('pulse');
  void btn.offsetWidth;
  btn.classList.add('pulse');
  updateLogView(taps);
}

function undoTap() {
  const taps = loadTaps();
  const key = getTonightKey();
  for (let i = taps.length-1; i >= 0; i--) {
    if (getNightKey(taps[i]) === key) { taps.splice(i,1); break; }
  }
  saveTaps(taps);
  updateLogView(taps);
}

function groupByNight(taps) {
  const map = {};
  taps.forEach(t => { const k = getNightKey(t); if (!map[k]) map[k]=[]; map[k].push(t); });
  return map;
}

function updateLogView(taps) {
  const key = getTonightKey();
  const tonight = taps.filter(t => getNightKey(t) === key);
  document.getElementById('tonight-num').textContent = tonight.length;
  if (tonight.length > 0) {
    const last = new Date(tonight[tonight.length-1]);
    document.getElementById('last-tap').textContent = 'last: ' + last.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('undo-btn').style.display = 'inline-block';
  } else {
    document.getElementById('last-tap').textContent = 'no taps yet tonight';
    document.getElementById('undo-btn').style.display = 'none';
  }
  const grouped = groupByNight(taps);
  const nightKeys = Object.keys(grouped).sort().reverse();
  const avg = arr => arr.length ? (arr.reduce((s,k)=>s+grouped[k].length,0)/arr.length).toFixed(1) : '—';
  document.getElementById('avg7').textContent  = avg(nightKeys.slice(0,7));
  document.getElementById('avg30').textContent = avg(nightKeys.slice(0,30));
}

function saveNote() {
  const notes = loadNotes();
  notes[getTonightKey()] = document.getElementById('notes-input').value;
  saveNotesData(notes);
}

function loadTonightNote() {
  document.getElementById('notes-input').value = loadNotes()[getTonightKey()] || '';
}

function getWeekKey(dateStr) {
  const d = new Date(dateStr+'T12:00:00');
  const day = d.getDay();
  return new Date(d.setDate(d.getDate() - day + (day===0?-6:1))).toISOString().slice(0,10);
}

function formatDate(dateStr) {
  return new Date(dateStr+'T12:00:00').toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}

const timingSymbol = {morning:'☀️AM',afternoon:'🌤PM',evening:'🌆EVE',neutral:'〰️MIX'};

function exportCSV() {
  const taps = loadTaps(), intake = loadIntake(), notes = loadNotes();
  const grouped = groupByNight(taps);
  const allKeys = new Set([...Object.keys(grouped),...Object.keys(intake)]);
  const keys = Array.from(allKeys).sort();
  let csv = 'Date,Pee Count,Tap Times,Water Glasses,Drinking Timing,Notes\n';
  keys.forEach(k => {
    const nt = grouped[k]||[];
    const times = nt.map(t=>new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})).join(' | ');
    const inf = intake[k]||{};
    const note = (notes[k]||'').replace(/"/g,'""');
    csv += `${k},${nt.length},"${times}",${inf.glasses||''},${inf.timing||''},"${note}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'nightlog.csv';
  a.click();
}

function renderHistory() {
  const taps = loadTaps(), intake = loadIntake(), notes = loadNotes();
  const grouped = groupByNight(taps);
  const allKeys = new Set([...Object.keys(grouped),...Object.keys(intake)]);
  const keys = Array.from(allKeys).sort().reverse();
  const container = document.getElementById('history-content');
  if (!keys.length) { container.innerHTML='<div class="empty">no data yet — start tapping!</div>'; return; }

  // Chart
  const chartDays=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);chartDays.push({key:k,count:(grouped[k]||[]).length,intake:intake[k]||null});}
  const maxC=Math.max(...chartDays.map(d=>d.count),1);
  let cHTML='<div class="chart">';
  chartDays.forEach(d=>{
    const h=Math.round((d.count/maxC)*90);
    const label=new Date(d.key+'T12:00:00').toLocaleDateString([],{month:'numeric',day:'numeric'});
    const wDot=d.intake?`<div class="bar-water">${d.intake.glasses}</div>`:'<div class="bar-water"> </div>';
    cHTML+=`<div class="bar-col"><div class="bar-val">${d.count>0?d.count:''}</div><div class="bar ${d.count===0?'zero':''}" style="height:${Math.max(h,2)}px"></div><div class="bar-date">${label}</div>${wDot}</div>`;
  });
  cHTML+='</div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>pee count</div><div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>water glasses</div></div><div class="chart-period-label">last 14 nights</div>';

  // Corr strip
  let corrHTML='';
  keys.slice(0,14).forEach(k=>{
    const pee=(grouped[k]||[]).length, inf=intake[k];
    corrHTML+=`<div class="corr-row"><div class="corr-date">${formatDate(k)}</div><div class="corr-pee">${pee}x</div><div class="corr-water ${!inf?'corr-no-data':''}">${inf?inf.glasses+' glasses':'—'}</div><div class="corr-timing">${inf?timingSymbol[inf.timing]:''}</div></div>`;
  });

  // Night list
  let listHTML='', curMonth=null, curWeek=null;
  keys.forEach(k=>{
    const month=k.slice(0,7), week=getWeekKey(k);
    if(month!==curMonth){curMonth=month;curWeek=null;listHTML+=`<div class="period-header">${new Date(k+'T12:00:00').toLocaleDateString([],{month:'long',year:'numeric'})}</div>`;}
    if(week!==curWeek){curWeek=week;listHTML+=`<div class="section-title">Week of ${new Date(week+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'})}</div>`;}
    const nt=grouped[k]||[];
    const times=nt.map(t=>new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})).join(' · ');
    const inf=intake[k];
    const note=notes[k]||'';
    const wLine=inf?`<div class="water-info">💧 ${inf.glasses} glasses &nbsp;·&nbsp; ${timingSymbol[inf.timing]}</div>`:`<div class="water-info" style="color:var(--border)">💧 no intake data</div>`;
    const nLine=note?`<div class="note-text">📝 ${note}</div>`:'';
    listHTML+=`<div class="night-row"><div class="night-row-top"><div><div class="date">${formatDate(k)}</div><div class="times">${times||'no taps'}</div></div><div class="count">${nt.length}</div></div>${wLine}${nLine}</div>`;
  });

  container.innerHTML=`
    <div class="section-title">last 14 nights</div>
    <div class="chart-wrap">${cHTML}</div>
    <div class="section-title">intake vs output</div>
    <div class="corr-strip">${corrHTML}</div>
    <div class="section-title">night log</div>
    <div class="night-list">${listHTML}</div>
    <button class="export-btn" onclick="exportCSV()">⬇ export all data as CSV</button>`;
}

function showView(name, e) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  e.target.classList.add('active');
  if(name==='history') renderHistory();
}

updateLogView(loadTaps());
updateWaterBadge();
loadTonightNote();
checkShowModal();
</script>
</body>
</html>
